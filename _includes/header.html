<header{% if include.type == "post" %} class="post-header"{% endif %}>
<div class="container">
<div>
<div>

  <h1>{% if page.title %}{{ page.title }}{% else %}<br>{% endif %}</h1>

  {% if page.subtitle %}
  <hr>
  <h2>{{ page.subtitle }}</h2>
  {% endif %}

  {% if include.type == "post" %}
  <div class="post-header_meta">Posted on <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%A, %-d %B %Y" }}</time></div>
  {% endif %}

</div>
</div>
</div>
</header>
